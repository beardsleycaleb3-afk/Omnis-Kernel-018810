<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff00">
    <title>018810 APEX</title>
    <style>
        :root { --glow: #0f0; --bg: #000; }
        body { 
            margin:0; background:var(--bg); color:var(--glow); 
            font-family:monospace; display: flex; justify-content: center; 
            align-items: center; height: 100vh; overflow: hidden;
        }

        /* FORCED 300x300 MONITOR CONTAINER */
        #monitor-frame {
            position: relative;
            width: 300px;
            height: 300px;
            border: 3px solid var(--glow);
            box-shadow: 0 0 20px var(--glow), inset 0 0 10px var(--glow);
            background: #050505;
            overflow: hidden;
        }

        #console-hud {
            position: absolute; top: 0; left: 0; width: 100%;
            background: rgba(0, 40, 0, 0.9);
            border-bottom: 1px solid var(--glow);
            padding: 5px; font-size: 9px; z-index: 10;
            display: flex; justify-content: space-between; box-sizing: border-box;
        }

        canvas { display: block; width: 300px; height: 300px; touch-action: none; }

        .btn-ui {
            background: var(--glow); color: #000; border: none;
            font-size: 8px; font-weight: bold; padding: 2px 5px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="monitor-frame">
    <div id="console-hud">
        <div>SYS: 018810<br>DATA: <span id="count">0</span></div>
        <div style="text-align: right;">
            <button class="btn-ui" onclick="location.reload()">RESET</button><br>
            <button class="btn-ui" onclick="exportData()" style="margin-top:2px">LOG</button>
        </div>
    </div>
    <canvas id="c"></canvas>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const countDisp = document.getElementById('count');

    // Force internal resolution to match 300x300
    canvas.width = 300;
    canvas.height = 300;

    let dataLog = [];

    function runKernel(x, y) {
        // Get coordinates relative to the 300x300 box
        const rect = canvas.getBoundingClientRect();
        const rx = x - rect.left;
        const ry = y - rect.top;
        const mx = 300 - rx;
        const my = 300 - ry;

        dataLog.push({t: Date.now(), x: rx, y: ry});
        countDisp.innerText = dataLog.length;

        // Draw 018810 Parity
        ctx.fillStyle = "rgba(0, 255, 0, 0.5)";
        ctx.fillRect(rx-2, ry-2, 4, 4);
        ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
        ctx.fillRect(mx-2, ry-2, 4, 4); // Symmetry
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(dataLog)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = '018810_DATA.json'; a.click();
    }

    canvas.addEventListener('pointermove', (e) => {
        if (e.buttons > 0) runKernel(e.clientX, e.clientY);
    });

    function animate() {
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(0,0,300,300);
        requestAnimationFrame(animate);
    }
    animate();

    // Register Service Worker correctly
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(() => {
            console.log("018810 Kernel Registered");
        });
    }
</script>
</body>
</html>
