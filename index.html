<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#018810">
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Omnis-Kernel-018810</title>
    <style>
        :root { --p-green: #9bbc0f; --shell: #2a2a2a; }
        body { margin: 0; background: #000; color: var(--p-green); font-family: monospace; overflow: hidden; touch-action: none; }
        #viewport { flex-grow: 1; position: relative; background: #000; border-bottom: 4px solid #111; height: calc(100vh - 160px); }
        canvas { width: 100%; height: 100%; display: block; }
        #boot-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; color: #018810; border: 2px solid #018810; }
        #deck { width: 100%; height: 160px; background: var(--shell); display: flex; flex-direction: column; border-top: 2px solid #444; position: absolute; bottom: 0; }
        #controls { display: grid; grid-template-columns: 1fr 1fr 1fr; height: 100%; align-items: center; }
        #dpad { width: 90px; height: 90px; position: relative; margin-left: 15px; }
        .d-btn { position: absolute; background: #111; width: 30px; height: 30px; border: 1px solid #444; border-radius: 5px; display: flex; justify-content: center; align-items: center; }
        #du { top: 0; left: 30px; } #dd { bottom: 0; left: 30px; }
        #dl { top: 30px; left: 0; } #dr { top: 30px; right: 0; }
        .sys-btns { display: flex; flex-direction: column; gap: 25px; align-items: center; }
        .s-btn { width: 30px; height: 12px; background: #444; border-radius: 10px; transform: rotate(-15deg); border: 1px solid #222; display: flex; justify-content: center; align-items: center; font-size: 8px;}
        #action { position: relative; width: 90px; height: 90px; margin-right: 15px; justify-self: end; }
        .a-btn { width: 35px; height: 35px; background: #8b1e2f; border-radius: 50%; position: absolute; border: 6px solid #444; display: flex; justify-content: center; align-items: center;}
        #btnB { bottom: 5px; left: 0; } #btnA { top: 5px; right: 0; }
    </style>
</head>
<body>
    <div id="viewport">
        <div id="boot-overlay">[ INITIALIZE KERNEL 018810 ]</div>
        <canvas id="main-canvas"></canvas>
    </div>

    <div id="deck">
        <div id="controls">
            <div id="dpad">
                <div id="du" class="d-btn">⬆️</div><div id="dd" class="d-btn">⬇️</div>
                <div id="dl" class="d-btn">⬅️</div><div id="dr" class="d-btn">➡️</div>
            </div>
            <div class="sys-btns">
                <div id="zoom-out" class="s-btn">➖</div>
                <div id="zoom-in" class="s-btn">➕</div>
            </div>
            <div id="action">
                <div id="btnB" class="a-btn">B</div>
                <div id="btnA" class="a-btn">A</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r137/three.min.js"></script>

    <script>
        const KERNEL_DATA = {
            outer: [
                // PASTE YOUR ENTIRE OUTER ARRAY HERE
            ],
            inner: [
                // PASTE YOUR ENTIRE INNER ARRAY HERE
            ]
        };
    </script>

    <script>
        let analyzer, dataArray, scene, camera, renderer;
        let innerPoints, outerPoints;
        let bellyDensity = 0;
        const RESPAWN_DIST = 500;

        const init = () => {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight - 160), 0.1, 2000);
            camera.position.z = 180;

            const canvas = document.getElementById('main-canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight - 160);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const createLayer = (data, color, size) => {
                const geo = new THREE.BufferGeometry();
                
                // Using Uint8Array with scaling to map negative floats to 0-255
                const pos = new Uint8Array(data.length * 3);
                
                data.forEach((p, idx) => {
                    const scale = 5; // Adjust this if geometry is too tight or exploded
                    pos[idx * 3]     = Math.max(0, Math.min(255, (p.x * scale) + 128));
                    pos[idx * 3 + 1] = Math.max(0, Math.min(255, (p.y * scale) + 128));
                    pos[idx * 3 + 2] = Math.max(0, Math.min(255, (p.z * scale) + 128));
                });

                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3, true));
                const mat = new THREE.PointsMaterial({ color, size, transparent: true, opacity: 0.8 });
                return { points: new THREE.Points(geo, mat), original: data };
            };

            // Initialize only if data arrays are populated
            if (KERNEL_DATA.outer.length > 0 && KERNEL_DATA.inner.length > 0) {
                outerPoints = createLayer(KERNEL_DATA.outer, 0xff0000, 1.5);
                innerPoints = createLayer(KERNEL_DATA.inner, 0x018810, 0.5);
                scene.add(outerPoints.points);
                scene.add(innerPoints.points);
            }

            animate();
        };

        const touch = (id, fn) => {
            const el = document.getElementById(id);
            if(el) el.addEventListener('pointerdown', (e) => { e.preventDefault(); fn(); });
        };

        document.getElementById('boot-overlay').addEventListener('click', async () => {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 256;
                source.connect(analyzer);
                dataArray = new Uint8Array(analyzer.frequencyBinCount);
                
                document.getElementById('boot-overlay').style.display = 'none';
                init();
            } catch (err) {
                // Fallback: Start geometry anyway if mic is blocked on mobile
                document.getElementById('boot-overlay').innerText = "[ AUDIO DENIED - TAP TO FORCE START ]";
                document.getElementById('boot-overlay').onclick = () => {
                    document.getElementById('boot-overlay').style.display = 'none';
                    init();
                };
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            
            if (analyzer && dataArray && outerPoints && innerPoints) {
                analyzer.getByteFrequencyData(dataArray);
                const bass = dataArray[2] / 20.0;
                const treble = dataArray[80] / 30.0;

                const updatePoints = (layer, f) => {
                    const attr = layer.points.geometry.attributes.position;
                    const pos = attr.array;
                    const scale = 5;
                    
                    layer.original.forEach((p, i) => {
                        let idx = i * 3; 
                        
                        let mX = p.x * (1 + f);
                        let mY = p.y * (1 + f);
                        
                        pos[idx]     = Math.max(0, Math.min(255, (mX * scale) + 128));
                        pos[idx + 1] = Math.max(0, Math.min(255, (mY * scale) + 128));
                        pos[idx + 2] = Math.max(0, Math.min(255, (p.z * scale) + 128));

                        if (layer === outerPoints) {
                            let d = Math.sqrt(mX*mX + mY*mY);
                            if (d < (5.0 + bellyDensity)) {
                                // Clamp bellyDensity floor
                                bellyDensity = Math.max(0, bellyDensity - 0.01);
                            }
                        }
                    });
                    attr.needsUpdate = true;
                };

                updatePoints(outerPoints, bass);
                updatePoints(innerPoints, treble);
            }
            
            scene.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        // Touch D-Pad
        touch('du', () => camera.position.y += 10);
        touch('dd', () => camera.position.y -= 10);
        touch('dl', () => scene.rotation.y -= 0.2);
        touch('dr', () => scene.rotation.y += 0.2);
        touch('zoom-in', () => camera.position.z -= 10);
        touch('zoom-out', () => camera.position.z += 10);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            console.log("New kernel version ready.");
                        }
                    });
                });
            });

            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
</body>
</html>
