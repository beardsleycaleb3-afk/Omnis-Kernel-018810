<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omnis-Kernel 018810</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'Omnis-Kernel 018810','short_name':'018810','start_url':'.','display':'standalone','background_color':'#000','theme_color':'#0f0','icons':[{'src':'https://via.placeholder.com/192/000/0f0?text=01','sizes':'192x192','type':'image/png'}]}">
    
    <style>
        body { margin:0; background:#000; color:#0f0; font-family:monospace; overflow:hidden; touch-action:none; }
        #hud { position:absolute; top:0; left:0; width:100%; background:rgba(0,30,0,0.9); border-bottom:2px solid #0f0; padding:10px; font-size:10px; z-index:1000; display:grid; grid-template-columns: 1fr 1fr 1fr; }
        .btn { background:#0f0; color:#000; border:none; padding:8px; font-weight:bold; cursor:pointer; }
        #dlArea { position:absolute; top:70px; left:5%; width:90%; z-index:2000; display:none; }
        #dlLink { color:#fff; background:#500; padding:15px; display:block; text-align:center; text-decoration:none; border:2px solid #f00; font-weight:bold; }
    </style>
</head>
<body>

<div id="hud">
    <div>SYS: OMNIS-018810<br>STATUS: KERNEL_LIVE<br>DATA: <span id="count">0</span></div>
    <div id="hex" style="text-align:center; font-size:14px; color:#fff; border:1px solid #0f0;">[0x00]</div>
    <div style="text-align:right;">FPS: 60<br><button class="btn" onclick="exportData()">EXPORT LOG</button></div>
</div>

<div id="dlArea"><a id="dlLink">↓ DOWNLOAD 018810_DATA.JSON ↓</a></div>
<canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const hexDisp = document.getElementById('hex');
    const countDisp = document.getElementById('count');
    const dlArea = document.getElementById('dlArea');
    const dlLink = document.getElementById('dlLink');

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    let frames = 0, dataLog = [], wave = [];

    function exportData() {
        if (dataLog.length === 0) return;
        const blob = new Blob([JSON.stringify(dataLog, null, 2)], {type: 'application/json'});
        dlLink.href = URL.createObjectURL(blob);
        dlLink.download = `018810_LOG_${Date.now()}.json`;
        dlArea.style.display = 'block';
    }

    function runKernel(x, y, dx, dy) {
        let mx = w - x, my = h - y;
        if (dataLog.length < 10000) {
            dataLog.push({t:Date.now(), x, y, mx, my, dx, dy});
            countDisp.innerText = dataLog.length;
        }
        hexDisp.innerText = `0x${Math.floor(x).toString(16).toUpperCase()}`;

        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(mx,y); ctx.moveTo(x,y); ctx.lineTo(x,my); ctx.stroke();
        
        ctx.strokeStyle = "rgba(0,255,180,0.6)";
        ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+(dx*15), y+(dy*15)); ctx.stroke();

        let pulse = 6 + Math.sin(frames * 0.2) * 3;
        ctx.fillStyle = "#0f0"; ctx.fillRect(x-pulse, y-pulse, pulse*2, pulse*2);
        ctx.fillStyle = "#fff"; ctx.fillRect(mx-pulse, y-pulse, pulse*2, pulse*2);
        ctx.fillStyle = "#fff"; ctx.fillRect(x-pulse, my-pulse, pulse*2, pulse*2);
        ctx.fillStyle = "#0f0"; ctx.fillRect(mx-pulse, my-pulse, pulse*2, pulse*2);

        wave.push(y);
        if(wave.length > w) wave.shift();
    }

    function loop() {
        frames++;
        ctx.fillStyle = "rgba(0,15,0,0.15)";
        ctx.fillRect(0,0,w,h);
        ctx.strokeStyle = "#0f0";
        ctx.lineWidth = 2;
        ctx.beginPath();
        for(let i=0; i<wave.length; i++) ctx.lineTo(i, h - (wave[i]/4) - 40);
        ctx.stroke();
        requestAnimationFrame(loop);
    }

    window.addEventListener('pointermove', (e) => {
        if (e.buttons > 0) runKernel(e.clientX, e.clientY, e.movementX, e.movementY);
    });

    window.addEventListener('resize', () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    });

    loop();

    // INLINE SERVICE WORKER FOR OFFLINE PERSISTENCE
    if ('serviceWorker' in navigator) {
        const swCode = `
            self.addEventListener('install', e => self.skipWaiting());
            self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
</script>
</body>
</html>
