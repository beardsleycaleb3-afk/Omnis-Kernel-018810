<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff00">
    <title>Omnis-Kernel-018810</title>
    <style>
        :root { --glow: #0f0; --bg: #000; --glow-blur: 15px; }
        * { box-sizing: border-box; touch-action: none; }
        body { margin:0; background:var(--bg); color:var(--glow); font-family:monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #monitor-frame { position: relative; width: 300px; height: 300px; border: 3px solid var(--glow); box-shadow: 0 0 var(--glow-blur) var(--glow), inset 0 0 10px var(--glow); background: #000; overflow: hidden; transition: box-shadow 0.05s ease-out; }
        #console-hud { position: absolute; top: 0; left: 0; width: 100%; background: rgba(0, 40, 0, 0.9); border-bottom: 1px solid var(--glow); padding: 5px; font-size: 9px; z-index: 10; display: flex; justify-content: space-between; }
        canvas { display: block; width: 300px; height: 300px; }
        #player-hud { position: absolute; bottom: 45px; left: 5px; right: 5px; font-size: 8px; z-index: 15; }
        #progress { width: 100%; height: 3px; background: rgba(0,255,0,0.3); margin: 2px 0; cursor: pointer; }
        #progress-fill { height: 100%; background: var(--glow); width: 0%; transition: width 0.1s; }
        .btn-018810 { background: var(--glow); color: #000; border: none; font-size: 8px; font-weight: bold; padding: 4px; cursor: pointer; flex: 1; }
        #audio-interface { position: absolute; bottom: 5px; width: 100%; padding: 5px; display: flex; gap: 5px; z-index: 20; }
    </style>
</head>
<body>

<div id="monitor-frame">
    <div id="console-hud">
        <div>SYS: 018810<br>LOG: <span id="count">0</span></div>
        <div id="time-display" style="text-align: right;">v.2.0.0<br>00:00 / 00:00</div>
    </div>
    
    <canvas id="c"></canvas>

    <div id="player-hud">
        <div id="track-name">No track</div>
        <div id="progress"><div id="progress-fill"></div></div>
    </div>

    <div id="audio-interface">
        <input type="file" id="mp3-input" accept="audio/*" style="display:none;">
        <button class="btn-018810" onclick="document.getElementById('mp3-input').click()">🌶️</button>
        <button class="btn-018810" id="play-btn">👻</button>
        <button class="btn-018810" onclick="export018810()">⚡</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const countDisp = document.getElementById('count');
    const timeDisp = document.getElementById('time-display');
    const trackName = document.getElementById('track-name');
    const playBtn = document.getElementById('play-btn');
    const progress = document.getElementById('progress');
    const progressFill = document.getElementById('progress-fill');
    const mp3Input = document.getElementById('mp3-input');

    canvas.width = 300; canvas.height = 300;

    let dataLog = [];
    let audioCtx, analyzer, dataArray, source, audioEl;

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // YOUR ORIGINAL 4-POINT KERNEL
    function runKernel(x, y, source = "input") {
        const rect = canvas.getBoundingClientRect();
        const rx = x - rect.left;
        const ry = y - rect.top;
        const mx = 300 - rx;
        const my = 300 - ry;

        dataLog.push({t: Date.now(), x: rx.toFixed(2), y: ry.toFixed(2), mx: mx.toFixed(2), my: my.toFixed(2), src: source});
        countDisp.innerText = dataLog.length;

        ctx.fillStyle = "#0f0"; ctx.fillRect(rx-2, ry-2, 4, 4);
        ctx.fillStyle = "#fff"; ctx.fillRect(mx-2, ry-2, 4, 4);
    }

    function setupAudio(file) {
        if (audioEl) audioEl.pause();
        if (audioCtx) audioCtx.close();
        
        trackName.textContent = file.name;
        const url = URL.createObjectURL(file);
        audioEl = new Audio(url);
        audioEl.preload = 'metadata';
        
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyzer = audioCtx.createAnalyser();
        analyzer.fftSize = 256;
        dataArray = new Uint8Array(analyzer.frequencyBinCount);

        source = audioCtx.createMediaElementSource(audioEl);
        source.connect(analyzer);
        analyzer.connect(audioCtx.destination);

        // Player controls
        audioEl.ontimeupdate = updatePlayer;
        audioEl.onloadedmetadata = () => {
            timeDisp.innerHTML = `v.2.0.0<br>00:00 / ${formatTime(audioEl.duration)}`;
        };
        audioEl.onended = () => {
            playBtn.textContent = 'PLAY';
            export018810();
        };

        driveWithAudio();
    }

    function updatePlayer() {
        const percent = (audioEl.currentTime / audioEl.duration) * 100;
        progressFill.style.width = percent + '%';
        timeDisp.innerHTML = `v.2.0.0<br>${formatTime(audioEl.currentTime)} / ${formatTime(audioEl.duration)}`;
    }

    function togglePlay() {
        if (!audioEl || !audioCtx) return;
        if (audioEl.paused) {
            audioCtx.resume();
            audioEl.play();
            playBtn.textContent = 'PAUSE';
        } else {
            audioEl.pause();
            playBtn.textContent = 'PLAY';
        }
    }

    function driveWithAudio() {
        if (!analyzer) return requestAnimationFrame(driveWithAudio);
        analyzer.getByteFrequencyData(dataArray);
        let bass = dataArray[2]; 
        let treble = dataArray[100]; 

        let glowIntensity = Math.max(10, (bass / 255) * 50);
        document.documentElement.style.setProperty('--glow-blur', glowIntensity + "px");

        if (bass > 115) {
            let x = 150 + (bass - 128) * 1.2;
            let y = 150 + (treble - 128) * 1.2;
            runKernel(x + canvas.getBoundingClientRect().left, y + canvas.getBoundingClientRect().top, "audio");
        }
        requestAnimationFrame(driveWithAudio);
    }

    function export018810() {
        if (dataLog.length === 0) return;
        const blob = new Blob([JSON.stringify(dataLog)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = '018810_CAPT.json';
        a.click();
    }

    // Controls
    playBtn.onclick = togglePlay;
    progress.onclick = (e) => {
        if (!audioEl) return;
        const rect = progress.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        audioEl.currentTime = pos * audioEl.duration;
    };

    canvas.addEventListener('touchstart', (e) => { 
        if (e.buttons > 0) runKernel(e.clientX, e.clientY, "touch"); 
    });
    mp3Input.addEventListener('change', (e) => {
    const file = e.target.files?.[0];
    if (file && file.type.startsWith('audio/')) {
        setupAudio(file);

canvas.addEventListener('touchstart', e => {e.preventDefault(); runKernel(e.touches[0].clientX, e.touches[0].clientY);}, {passive:false});
canvas.addEventListener('touchmove', e => {e.preventDefault(); runKernel(e.touches[0].clientX, e.touches[0].clientY);},
    });

    function loop() {
        ctx.fillStyle = 'rgba(0,5,0,0.1)';
        ctx.fillRect(0,0,300,300);
        requestAnimationFrame(loop);
    }
    loop();

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
