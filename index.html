    <meta name="theme-color" content="#00ff00">
    <title>Omnis-Kernel-018810</title>
    <style>
        :root { --glow: #0f0; --bg: #000; }
        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin:0; padding:0; background:var(--bg); color:var(--glow); 
            font-family:monospace; overflow:hidden; height:100vh; width:100vw;
        }
        #kernel-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
            border: 2px solid #0f0;
            background: rgba(0,20,0,0.6);
            box-shadow: 0 0 30px #0f0;
            overflow: hidden;
        }
        canvas { display: block; }
        #hud {
            position:absolute; top:0; left:0; width:100%; 
            background:rgba(0,25,0,0.92); border-bottom:2px solid #0f0; 
            padding:6px 10px; font-size:10px; z-index:1000; 
            display:grid; grid-template-columns: 1fr auto 1fr; align-items:center;
        }
        #controls {
            position: absolute;
            bottom: 0; left: 0; width: 100%; 
            height: 100px;
            background: rgba(0,15,0,0.95);
            border-top: 2px solid #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            z-index: 2000;
        }
        .btn-018810 {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: #0f0;
            color: #000;
            border: none;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 12px #0f0;
        }
        #status-overlay {
            position:absolute; top:52px; right:8px; background:rgba(0,20,0,0.9); 
            padding:8px; border:1px solid #0f0; font-size:9px; line-height:1.3;
            pointer-events:none; z-index:900; max-width:170px;
        }
        #missionComplete {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            background:rgba(0,30,0,0.98); border:3px solid #0f0; padding:20px;
            text-align:center; z-index:3000; display:none; max-width:90%;
        }
    </style>
</head>

    <button class="btn-018810" onclick="location.reload()">RESTART KERNEL</button>
</div>

// Add midpoints for smoother rings
function addMidpoints(pts) {
    const res = [];
    for (let i = 0; i < pts.length; i++) {
        res.push(pts[i]);
        const n = pts[(i+1)%pts.length];
        res.push({x:(pts[i].x+n.x)*0.5, y:(pts[i].y+n.y)*0.5, z:(pts[i].z+n.z)*0.5});
    }
    return res;
}

const outerSmooth = addMidpoints(KERNEL_DATA.outer);
const midSmooth = addMidpoints(KERNEL_DATA.mid);
const innerSmooth = addMidpoints(KERNEL_DATA.inner);

// ==================== CORE VARS ====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: true });
const centerX = 160, centerY = 160;

let dataLog = [], particles = [], rotationAngle = 0;
let audioCtx, analyzer, freqData, audioEl = null;
let showD8Lines = true;
let painting = false;

// ==================== D8 16-WAY ====================
function getD8Symmetries(x, y) {
    const dx = x - centerX, dy = y - centerY;
    const sym = [];
    for (let k = 0; k < 8; k++) {
        const theta = k * Math.PI / 4;
        const c = Math.cos(theta), s = Math.sin(theta);
        const rx = dx * c - dy * s;
        const ry = dx * s + dy * c;
        sym.push({x: centerX + rx, y: centerY + ry});
        sym.push({x: centerX + rx, y: centerY - ry});
    }
    return sym;
}

function spawnParticle(x, y) {
    const mirrors = getD8Symmetries(x, y);
    const bass = parseFloat(document.getElementById('bass-val').textContent) || 0;
    
    mirrors.forEach(m => {
        particles.push({
            x: m.x, y: m.y,
            vx: (Math.random()-0.5)*9,
            vy: (Math.random()-0.5)*9,
            size: 5.5 + Math.random()*4,
            life: 950
        });
    });

    if (dataLog.length < 20000) {
        dataLog.push({
            t: Date.now(),
            original: {x:Math.floor(x), y:Math.floor(y)},
            d8: mirrors.map(p => ({x:Math.floor(p.x), y:Math.floor(p.y)})),
            bass: bass
        });
        document.getElementById('count').textContent = dataLog.length;
    }
}

// ==================== RENDER ====================
function renderGeometricLayer() {
    const b = parseFloat(document.getElementById('bass-val').textContent) || 0;
    const scale = KERNEL_DATA.config.scale * (1 + b/100);
    rotationAngle += KERNEL_DATA.config.rotationSpeedBase * (1 + b/25);

    const layers = [
        {pts: outerSmooth, col: '#0ff', w: 1.8},
        {pts: midSmooth,   col: '#0f0', w: 1.4},
        {pts: innerSmooth, col: '#ff0', w: 1.1}
    ];

    layers.forEach(l => {
        ctx.strokeStyle = l.col;
        ctx.lineWidth = l.w;
        ctx.beginPath();
        l.pts.forEach((p,i) => {
            const c = Math.cos(rotationAngle), s = Math.sin(rotationAngle);
            const rx = p.x * c - p.z * s;
            const sx = centerX + rx * scale * 0.96;
            const sy = centerY + p.y * scale * 0.78;
            i===0 ? ctx.moveTo(sx,sy) : ctx.lineTo(sx,sy);
        });
        ctx.closePath();
        ctx.stroke();
    });
}

function loop() {
    ctx.fillStyle = "rgba(0,15,0,0.22)";
    ctx.fillRect(0,0,320,320);
    renderGeometricLayer();

    for (let i=particles.length-1; i>=0; i--) {
        const p = particles[i];
        p.life--; p.x += p.vx; p.y += p.vy;
        if (p.life <= 0) { particles.splice(i,1); continue; }
        ctx.fillStyle = "#0f0";
        ctx.fillRect(p.x-1, p.y-1, p.size, p.size);
    }
    requestAnimationFrame(loop);
}

// ==================== FULL AUDIO + SONG END ====================
async function setupAudio(file) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    audioEl = new Audio(URL.createObjectURL(file));
    if (!analyzer) {
        analyzer = audioCtx.createAnalyser();
        analyzer.fftSize = 512;
        freqData = new Uint8Array(analyzer.frequencyBinCount);
    }
    const source = audioCtx.createMediaElementSource(audioEl);
    source.connect(analyzer);
    analyzer.connect(audioCtx.destination);

    audioEl.onended = () => {
        document.getElementById('missionComplete').style.display = 'block';
    };

    audioEl.play();
    driveAudio();
}

function driveAudio() {
    if (!analyzer) return;
    analyzer.getByteFrequencyData(freqData);

    let bass=0, mid=0, treble=0, rms=0;
    for (let i=0;i<8;i++) bass += freqData[i];
    for (let i=8;i<32;i++) mid += freqData[i];
    for (let i=32;i<64;i++) treble += freqData[i];
    for (let i=0;i<freqData.length;i++) rms += freqData[i]**2;

    document.getElementById('bass-val').textContent = Math.floor(bass/8/2.55) + "%";
    document.getElementById('mid-val').textContent = Math.floor(mid/24/2.55) + "%";
    document.getElementById('treble-val').textContent = Math.floor(treble/32/2.55) + "%";
    document.getElementById('rms-val').textContent = (Math.sqrt(rms/freqData.length)/255).toFixed(2);

    requestAnimationFrame(driveAudio);
}

// ==================== CONTROLS ====================
function launchSeedBurst() {
    for (let i=0; i<10; i++) spawnParticle(160, 160);
}

function toggleD8Lines() {
    showD8Lines = !showD8Lines;
}

function clearCanvas() {
    ctx.clearRect(0,0,320,320);
    dataLog = []; particles = [];
    document.getElementById('count').textContent = "0";
}

// Touch Painting
canvas.addEventListener('pointerdown', e => {
    painting = true;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    spawnParticle(x, y);
});
canvas.addEventListener('pointermove', e => {
    if (!painting) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    spawnParticle(x, y);
});
canvas.addEventListener('pointerup', () => painting = false);

document.getElementById('mp3-input').onchange = e => setupAudio(e.target.files[0]);

// ==================== MISSION REPORTS ====================
function downloadMissionReport() {
    let html = `<html><head><title>D8 Mission Report</title><style>body{font-family:monospace;background:#000;color:#0f0}</style></head><body>`;
    html += `<h1>D8 16-WAY MISSION LOG</h1>`;
    html += `<table border="1" style="border-collapse:collapse"><tr><th>Time</th><th>Origin</th><th>Bass</th><th>16 Mirrors</th></tr>`;
    dataLog.forEach(r => {
        const mirrors = r.d8.map(m=>`(\( {m.x}, \){m.y})`).join(" ");
        html += `<tr><td>\( {new Date(r.t).toISOString().slice(11,19)}</td><td>( \){r.original.x},\( {r.original.y})</td><td> \){r.bass}%</td><td>${mirrors}</td></tr>`;
    });
    html += `</table></body></html>`;
    
    const blob = new Blob([html], {type:'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `018810_D8_REPORT_${Date.now()}.html`;
    a.click();
}

function downloadCSV() {
    let csv = "timestamp,original_x,original_y,bass\n";
    dataLog.forEach(r => {
        csv += `\( {r.t}, \){r.original.x},\( {r.original.y}, \){r.bass}\n`;
    });
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `018810_D8_DATA_${Date.now()}.csv`;
    a.click();
}
