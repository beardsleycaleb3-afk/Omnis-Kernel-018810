<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hex_stream = document.getElementById('hex_stream');
const metrics = document.getElementById('metrics');

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;
let frames = 0;

function runDeepLogic(x, y) {
    let mx = w - x;
    let my = h - y;
    
    // Calculate "Distance Parity" (The Gap between twins)
    let gap = Math.abs(x - mx).toFixed(2);
    hex_stream.innerText = `[GAP: ${gap}px]`;
    
    // Core 018810 Symmetry Vectors
    ctx.strokeStyle = "rgba(0, 255, 0, 0.4)";
    ctx.beginPath();
    ctx.moveTo(x, y); ctx.lineTo(mx, y); // H2 Vector
    ctx.moveTo(x, y); ctx.lineTo(x, my); // H4 Vector
    ctx.stroke();

    // The "Data Seed" (Rectangle Symmetry)
    let size = 10 + (Math.abs(w/2 - x) / 10); // Grows as you move away from center
    ctx.fillStyle = "#fff";
    ctx.fillRect(x - size/2, y - size/2, size, size);
    ctx.fillStyle = "#0f0";
    ctx.fillRect(mx - size/2, my - size/2, size, size);

    // Trigger logic for center crossing
    if (Math.abs(x - w/2) < 2) {
        metrics.innerHTML = `LATENCY: 0.00ms<br>LOAD: LOCK<br>ID: 0x8810_F`;
    }
}

function loop() {
    frames++;
    ctx.fillStyle = "rgba(0, 5, 0, 0.05)"; // Deep persistence
    ctx.fillRect(0, 0, w, h);
    
    // Draw Coordinate Grid
    ctx.strokeStyle = "rgba(0, 50, 0, 0.2)";
    for(let i=0; i<w; i+=w/8) { ctx.strokeRect(i, 0, 1, h); }
    
    requestAnimationFrame(loop);
}

window.addEventListener('pointermove', (e) => {
    if (e.buttons > 0) runDeepLogic(e.clientX, e.clientY);
});

loop();
</script>

    <script>
        let analyzer, dataArray, scene, camera, renderer, audioSource;
        let outerPoints, midPoints, innerPoints;

        const createLayer = (data, color, size) => {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(data.length * 3);
            data.forEach((p, idx) => {
                pos[idx * 3]     = p.x;
                pos[idx * 3 + 1] = p.y;
                pos[idx * 3 + 2] = p.z;
            });
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ 
                color, 
                size, 
                transparent: true, 
                opacity: 1 
            });
            return { points: new THREE.Points(geo, mat), original: data };
        };

        const init = () => {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight - 160), 0.1, 2000);
            camera.position.z = 100;

            const canvas = document.getElementById('main-canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight - 160);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // BIGGER points so you can actually see them on a phone
            outerPoints = createLayer(KERNEL_DATA.outer, 0xff0000, 3.5);
            midPoints  = createLayer(KERNEL_DATA.mid,  0x9bbc0f, 2.2);
            innerPoints= createLayer(KERNEL_DATA.inner, 0x018810, 1.4);

            scene.add(outerPoints.points, midPoints.points, innerPoints.points);

    
            window.addEventListener('resize', () => {
                const h = window.innerHeight - 160;
                camera.aspect = window.innerWidth / h;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, h);
            });

            animate();
        };

        const runKernel = async () => {
            const audio = document.getElementById('kernel-audio');
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            audioSource = audioCtx.createMediaElementSource(audio);
            analyzer = audioCtx.createAnalyser();
            analyzer.fftSize = 256;
            audioSource.connect(analyzer);
            analyzer.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyzer.frequencyBinCount);

            audio.play().catch(e => console.log("Audio play prevented until user interaction"));
            document.getElementById('boot-overlay').style.display = 'none';
            init();
        };

        // Start the whole thing when you tap the boot overlay
        document.getElementById('boot-overlay').addEventListener('pointerdown', runKernel);

        function animate() {
            requestAnimationFrame(animate);
            if (analyzer && dataArray) {
                analyzer.getByteFrequencyData(dataArray);
                
                const update = (layer, freqIdx) => {
                    const attr = layer.points.geometry.attributes.position;
                    const amp = dataArray[freqIdx] / 15.0;
                    for (let i = 0; i < layer.original.length; i++) {
                        const p = layer.original[i];
                        attr.array[i * 3]     = p.x * (1 + amp * 0.1);
                        attr.array[i * 3 + 1] = p.y * (1 + amp * 0.1);
                        attr.array[i * 3 + 2] = p.z * (1 + amp * 0.1);
                    }
                    attr.needsUpdate = true;
                };

                update(outerPoints, 5);
                update(midPoints, 30);
                update(innerPoints, 60);
            }
            scene.rotation.y += 0.003;
            renderer.render(scene, camera);
    
        }
        
        const touch = (id, fn) => document.getElementById(id).addEventListener('pointerdown', (e) => { 
            e.preventDefault(); 
            fn(); 
        });
        touch('du', () => camera.position.y += 5);
        touch('dd', () => camera.position.y -= 5);
        touch('dl', () => scene.rotation.y -= 0.1);
        touch('dr', () => scene.rotation.y += 0.1);
        touch('zoom-in', () => camera.position.z -= 5);
        touch('zoom-out', () => camera.position.z += 5);
        
    </script>
    
    <script>
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Omnis-Kernel-018810: Online'))
                    .catch(err => console.error('Omnis-Kernel-018810: Failed', err));
            });
        }
    </script>
